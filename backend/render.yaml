# Render deployment configuration
# https://docs.render.com/blueprint-spec

databases:
  - name: fleet-eld-db
    plan: free
    databaseName: fleet_eld_db
    user: fleet_eld_user

services:
  - type: web
    name: fleet-eld-api
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn eld_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-eld-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://fleet-eld-trip-planner.vercel.app"
      - key: PYTHON_VERSION
        value: "3.11.6"
