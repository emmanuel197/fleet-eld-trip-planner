# Render deployment configuration
# https://docs.render.com/blueprint-spec
#
# Database: external Neon PostgreSQL (NOT a Render-managed DB).
# Set DATABASE_URL in the Render dashboard (Environment tab) — it is
# marked `sync: false` so the Neon password is never committed to git.

services:
  - type: web
    name: fleet-eld-api
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn eld_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://tripplanner-indol-six.vercel.app"
      - key: PYTHON_VERSION
        value: "3.11.6"
